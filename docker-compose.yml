version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: didacta-postgres
    environment:
      POSTGRES_DB: didacta
      POSTGRES_USER: didacta
      POSTGRES_PASSWORD: didacta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - didacta-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U didacta"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: didacta-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: didacta
      KC_DB_PASSWORD: didacta
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/keycloak/realm:/opt/keycloak/data/import
      - ./infra/keycloak/themes:/opt/keycloak/themes
      - keycloak_data:/opt/keycloak/data
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - didacta-net

  didacta-api:
    build:
      context: ./didacta-api
      dockerfile: Dockerfile
    container_name: didacta-api
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/didacta
      SPRING_DATASOURCE_USERNAME: didacta
      SPRING_DATASOURCE_PASSWORD: didacta
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/didacta
    ports:
      - "8088:8080"
    depends_on:
      keycloak:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - didacta-net

  didacta-web:
    build: ./didacta-web
    container_name: didacta-web
    ports:
      - "5173:5173"
    environment:
      - VITE_KEYCLOAK_URL=http://localhost:8081
      - VITE_KEYCLOAK_REALM=didacta
      - VITE_KEYCLOAK_CLIENT_ID=didacta-web
      - VITE_API_BASE_URL=http://localhost:8088
    depends_on:
      - didacta-api
      - keycloak
    networks:
      - didacta-net

networks:
  didacta-net:
    driver: bridge

volumes:
  postgres_data:
  keycloak_data:
